<!DOCTYPE html>
<html>
<head>
    <title>AI Cloud Resource Allocation</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>AI Based Cloud Resource Allocation System</h1>

<table>
<tr>
<th>Task</th>
<th>Allocated VM</th>
</tr>

{% for task, vm in allocations.items() %}
<tr>
<td>{{task}}</td>
<td>{{vm}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
